{% extends 'base.html' %}{% block content %}<div class="jumbotron bg-light p-5 rounded mb-4"><h1>HiFive Shop-এ স্বাগতম</h1><p>প্রাকৃতিক ও চামড়াজাত পণ্যের সেরা ঠিকানা</p><a href="{% url 'products:product_list' %}" class="btn btn-primary">ব্রাউজ করুন</a></div><h3>সর্বশেষ পণ্য</h3><div class="row">{% for product in products %}<div class="col-md-3 mb-4"><div class="card h-100"><img src="{{ product.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;"><div class="card-body"><h5 class="card-title">{{ product.name }}</h5><p class="card-text">টাকা {{ product.price }}</p><a href="{% url 'products:product_detail' product.id %}" class="btn btn-sm btn-outline-primary">বিস্তারিত</a><a href="{% url 'orders:add_to_cart' product.id %}" class="btn btn-sm btn-success">কার্টে যোগ</a></div></div></div>{% endfor %}</div>{% endblock %}
