{% extends 'base.html' %}{% block content %}<div class="row"><div class="col-md-6"><img src="{{ product.image.url }}" class="img-fluid"></div><div class="col-md-6"><h2>{{ product.name }}</h2><p>{{ product.description }}</p><h4>টাকা {{ product.price }}</h4><p><strong>শিপিং:</strong> {{ product.shipping_details }}</p><a href="{% url 'orders:add_to_cart' product.id %}" class="btn btn-primary">কার্টে যোগ করুন</a></div></div>{% endblock %}
