{% extends 'base.html' %}{% block content %}<h2>সব পণ্য</h2><div class="row">{% for product in products %}<div class="col-md-3 mb-4"><div class="card"><img src="{{ product.image.url }}" class="card-img-top" height="180" style="object-fit:cover;"><div class="card-body"><h6>{{ product.name|truncatechars:30 }}</h6><strong>{{ product.price }} টাকা</strong><p class="small">{{ product.shipping_details|truncatewords:8 }}</p><a href="{% url 'orders:add_to_cart' product.id %}" class="btn btn-sm btn-warning">কার্টে নিন</a></div></div></div>{% empty %}<p>কোনো পণ্য পাওয়া যায়নি।</p>{% endfor %}</div>{% endblock %}
